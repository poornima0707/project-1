name: End-to-End DevSecOps CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  devsecops-pipeline:
    # Tells GitHub to send jobs straight to your listening VirtualBox runner
    runs-on: self-hosted 

    steps:
      # 1. Pull down your repository code onto the VM workspace
      - name: Checkout Codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Secret Scanning using Gitleaks
      - name: Scan for Exposed Secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false # Stop the build immediately if credentials leak

      # 3. Static Application Security Testing (SCA / Package Dependencies)
      - name: Scan Package Dependencies via Trivy (FS Mode)
        run: |
          trivy fs --format table --exit-code 0 --severity HIGH,CRITICAL .

      # 4. Build the Local Application Container Artifact
      - name: Build Application Docker Image
        run: |
          docker build -t devsecops-app:${{ github.sha }} .

      # 5. Container Security Scanning
      - name: Scan Docker Image via Trivy (Image Mode)
        run: |
          trivy image --format table --exit-code 1 --severity HIGH,CRITICAL devsecops-app:${{ github.sha }}
