name: End-to-End DevSecOps CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  devsecops-pipeline:
    runs-on: self-hosted 

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for Exposed Secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true # Logs leaks without crashing the build while testing

      - name: Scan Package Dependencies via Trivy (FS Mode)
        run: |
          trivy fs --format table --exit-code 0 --severity HIGH,CRITICAL .
